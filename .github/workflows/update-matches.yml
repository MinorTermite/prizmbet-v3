name: Update Matches & Deploy to GitHub Pages

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate fresh data
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PINNACLE_LOGIN: ${{ secrets.PINNACLE_LOGIN }}
          PINNACLE_PASSWORD: ${{ secrets.PINNACLE_PASSWORD }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -n "$PROXY_URL" ] || { [ -n "$UPSTASH_REDIS_URL" ] && [ -n "$UPSTASH_REDIS_TOKEN" ]; }; then
            export PROXY_ENABLED=true
          else
            export PROXY_ENABLED=false
          fi

          python backend/api/generate_json.py

          if [ -n "$API_FOOTBALL_KEY" ]; then
            python backend/score_enricher.py
          fi

      - name: Validate fresh payload
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          path = Path('frontend/matches-today.json')
          payload = json.loads(path.read_text(encoding='utf-8'))
          last_update = payload.get('last_update')
          total = payload.get('total', 0)
          today_total = payload.get('today_total', len(payload.get('matches', [])))

          if not last_update:
              raise SystemExit('matches-today.json has no last_update')

          dt = datetime.fromisoformat(last_update)
          age_hours = (datetime.now(timezone.utc) - dt.astimezone(timezone.utc)).total_seconds() / 3600
          print(f'last_update={last_update} total={total} today_total={today_total} age_hours={age_hours:.2f}')

          if total <= 0 or today_total <= 0:
              raise SystemExit('fresh payload is empty')

          if age_hours > 6:
              raise SystemExit('fresh payload is stale after generation step')
          PY

      - name: Commit and push refreshed frontend data when it changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add frontend/matches.json frontend/matches-today.json
          git commit -m "chore(data): refresh match payload $(date +'%Y-%m-%d %H:%M UTC')" || echo "No data changes to commit"
          git push || echo "Nothing to push"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./frontend"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
