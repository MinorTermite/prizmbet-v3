      <stop stop-color="#F4F0FF"/>
      <stop offset="0.58" stop-color="#D8CCFF"/>
      <stop offset="1" stop-color="#B776FF"/>
    </linearGradient>
    <filter id="softGlow" x="0" y="0" width="420" height="86" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
