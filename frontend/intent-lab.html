<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prizmbet Prototype Archive</title>
  <meta name="description" content="Archived prototype route for Prizmbet v3.">
  <link rel="stylesheet" href="css/intent-lab.css">
  <style>
    .archive-shell { min-height: 100vh; display: grid; place-items: center; padding: 32px 16px; }
    .archive-card { width: min(720px, 100%); }
    .archive-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
    .archive-actions a { text-decoration: none; }
    .lang-switch { display: inline-flex; gap: 8px; margin-bottom: 18px; }
    .lang-btn { min-width: 54px; min-height: 40px; border-radius: 999px; border: 1px solid rgba(129,140,248,.26); background: rgba(255,255,255,.04); color: #fff; font-weight: 700; cursor: pointer; }
    .lang-btn.is-active { background: linear-gradient(135deg, rgba(124,58,237,.88), rgba(59,130,246,.88)); }
  </style>
</head>
<body>
  <div class="archive-shell">
    <main class="panel archive-card">
      <div class="lang-switch">
        <button class="lang-btn" data-lang="ru" type="button">RU</button>
        <button class="lang-btn" data-lang="en" type="button">EN</button>
      </div>
      <div class="section-head">
        <h1 data-i18n="title">Прототипный маршрут архивирован</h1>
        <span class="muted-chip" data-i18n="chip">режим релиза v3</span>
      </div>
      <p class="helper-text" data-i18n="copy">Старый intent lab больше не участвует в публичном сценарии. Рабочий путь v3 теперь находится на главном сайте: линия, купон, кабинет и операторская панель.</p>
      <div class="archive-actions">
        <a class="primary-btn" data-i18n="main" href="./index.html">Открыть основной сайт</a>
        <a class="ghost-btn" data-i18n="operator" href="./operator.html">Открыть панель оператора</a>
      </div>
    </main>
  </div>
<script>
(function () {
  const KEY = 'prizmbet_lang_v1';
  const D = {
    ru: {
      title: 'Прототипный маршрут архивирован',
      chip: 'режим релиза v3',
      copy: 'Старый intent lab больше не участвует в публичном сценарии. Рабочий путь v3 теперь находится на главном сайте: линия, купон, кабинет и операторская панель.',
      main: 'Открыть основной сайт',
      operator: 'Открыть панель оператора',
      pageTitle: 'Prizmbet Архив прототипа'
    },
    en: {
      title: 'Prototype route archived',
      chip: 'v3 release mode',
      copy: 'The old intent lab is no longer part of the public flow. The working v3 path now lives on the main site: line, coupon, cabinet and operator panel.',
      main: 'Open main site',
      operator: 'Open operator panel',
      pageTitle: 'Prizmbet Prototype Archive'
    }
  };

  function lang() {
    return (localStorage.getItem(KEY) || 'ru').toLowerCase() === 'en' ? 'en' : 'ru';
  }

  function apply() {
    const current = lang();
    document.documentElement.lang = current;
    document.title = D[current].pageTitle;
    document.querySelectorAll('[data-i18n]').forEach((el) => {
      el.textContent = D[current][el.dataset.i18n] || '';
    });
    document.querySelectorAll('[data-lang]').forEach((btn) => {
      btn.classList.toggle('is-active', btn.dataset.lang === current);
    });
  }

  document.querySelectorAll('[data-lang]').forEach((btn) => {
    btn.addEventListener('click', () => {
      localStorage.setItem(KEY, btn.dataset.lang);
      apply();
    });
  });

  apply();
})();
</script>
</body>
</html>
